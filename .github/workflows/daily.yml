name: Daily arXiv Update

on:
  schedule:
    - cron: '0 2 * * 1-5'  # 2 AM UTC, Mon–Fri
  workflow_dispatch:
    inputs:
      retry_remaining:
        description: 'Remaining delayed retry attempts (internal, set by retry.yml)'
        required: false
        default: '5'

concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tool repo
        uses: actions/checkout@v4

      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: postoday/arxiv-daily
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}
          path: _site_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 60
          command: python run.py --fetch-only --skip-translate --data-dir _site_repo/data --site-dir _site_repo

      - name: Translate
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 120
          command: python run.py --translate-only --fetch-only --data-dir _site_repo/data --site-dir _site_repo

      - name: Extract figures, HTML links, and affiliations
        run: python run.py --extract-figures --fetch-only --data-dir _site_repo/data --site-dir _site_repo

      - name: Build site
        run: python run.py --build-only --data-dir _site_repo/data --site-dir _site_repo

      - name: Commit and push site
        working-directory: _site_repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: update $(date -u +%Y-%m-%d)"
          git push

      - name: Schedule retry on failure
        if: failure()
        run: |
          REMAINING="${{ inputs.retry_remaining || '5' }}"
          echo "Remaining retries: $REMAINING"
          if [ "$REMAINING" -gt 0 ]; then
            gh workflow run --repo postoday/arxiv-daily-tool retry.yml -f remaining_attempts="$REMAINING"
            echo "Delayed retry scheduled (${REMAINING} attempts left)."
          else
            echo "No retries remaining. Giving up."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
